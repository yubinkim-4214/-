<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover { background: #4338ca; }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-bar button {
      padding: 5px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 20px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #6b7280;
    }

    .filter-bar button.active {
      border-color: #4f46e5;
      background: #4f46e5;
      color: white;
    }

    .list { padding: 8px 0; min-height: 60px; }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 40px 20px;
      font-size: 0.95rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    .item:last-child { border-bottom: none; }
    .item:hover { background: #f9fafb; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #111827;
      transition: all 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #d1d5db;
      font-size: 1.2rem;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #ef4444; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>쇼핑 리스트</h1>
      <p id="summary">항목 없음</p>
    </header>

    <div class="input-area">
      <input type="text" id="newItem" placeholder="추가할 항목 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <footer>
      <span id="remaining"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </footer>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(item =>
        filter === 'all' ? true :
        filter === 'done' ? item.checked :
        !item.checked
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">항목이 없습니다</div>';
      } else {
        list.innerHTML = filtered.map(item => `
          <div class="item ${item.checked ? 'checked' : ''}" id="item-${item.id}">
            <input type="checkbox" ${item.checked ? 'checked' : ''}
              onchange="toggle(${item.id})" />
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" onclick="remove(${item.id})">&#x2715;</button>
          </div>
        `).join('');
      }

      const done = items.filter(i => i.checked).length;
      const total = items.length;
      document.getElementById('summary').textContent =
        total === 0 ? '항목 없음' : `${done}/${total} 완료`;
      document.getElementById('remaining').textContent =
        `남은 항목 ${total - done}개`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
